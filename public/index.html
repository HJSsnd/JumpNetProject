<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能链接分发系统</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #1a1a1a;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url("https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?q=80&w=2070&auto=format&fit=crop");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #ecf0f1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 550px;
        }
        h1 {
            color: #ffffff;
            text-align: center;
            margin-top: 0;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .description {
            color: #dcdde1;
            font-size: 14px;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #f1f2f6;
            font-weight: 600;
        }
        input[type="url"] {
            width: 100%;
            padding: 12px;
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="url"]::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        input[type="url"]:focus {
            border-color: #2ecc71;
            outline: none;
            box-shadow: 0 0 0 2px rgba(46, 204, 113, 0.3);
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        button:hover {
            background-color: #27ae60;
            transform: translateY(-2px);
        }
        .result {
            margin-top: 25px;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            border-left: 4px solid #2ecc71;
            display: none;
        }
        .result strong {
            color: #ecf0f1;
            display: block;
            margin-bottom: 8px;
        }
        .result a {
            color: #2ecc71;
            font-weight: bold;
            word-break: break-all;
            text-decoration: none;
            font-size: 16px;
        }
        .result a:hover {
            text-decoration: underline;
        }
        .error {
            color: #ff6b81;
            background-color: rgba(255, 107, 129, 0.15);
            border: 1px solid rgba(255, 107, 129, 0.3);
            padding: 12px;
            border-radius: 6px;
            margin-top: 15px;
            text-align: center;
            display: none;
            font-size: 14px;
        }
        .note {
            font-size: 13px;
            color: #a4b0be;
            margin-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
        }
        .history-section {
            margin-top: 40px;
            border-top: 2px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }
        .history-section h2 {
            font-size: 18px;
            color: #ffffff;
            margin-bottom: 15px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 300px;
            overflow-y: auto;
        }
        /* 自定义滚动条 */
        .history-list::-webkit-scrollbar {
            width: 6px;
        }
        .history-list::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 3px;
        }
        .history-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }
        .history-item {
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            font-size: 14px;
            transition: background-color 0.2s;
        }
        .history-item:hover {
            background-color: rgba(0, 0, 0, 0.5);
        }
        .history-item .link-b {
            font-weight: bold;
            color: #2ecc71;
            text-decoration: none;
            display: block;
            margin-bottom: 5px;
        }
        .history-item .link-b:hover {
            text-decoration: underline;
        }
        .history-item .targets {
            color: #a4b0be;
            font-size: 13px;
            margin-bottom: 5px;
        }
        .history-item .time {
            color: #747d8c;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px;
        }
        .history-item .ip-info {
            background-color: rgba(255, 255, 255, 0.1);
            color: #dcdde1;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>HJS的智能链接生成器</h1>
    <div class="description">
        填入网址A和网址C，系统将生成一个新网址B。<br>
        <strong>网址B的行为：</strong><br>
        用 <strong>谷歌浏览器</strong> 打开 ➔ 跳转到网址C<br>
        用 <strong>其他浏览器</strong> 打开 ➔ 跳转到网址A
    </div>
    
    <div class="form-group">
        <label for="urlA">网址A (其他浏览器跳转目标)</label>
        <input type="url" id="urlA" placeholder="例如：https://www.baidu.com" required>
    </div>
    
    <div class="form-group">
        <label for="urlC">预定网址C (谷歌浏览器跳转目标)</label>
        <input type="url" id="urlC" placeholder="例如：https://www.google.com" required>
    </div>
    
    <button id="generateBtn">生成专属网址B</button>
    
    <div class="error" id="errorMsg"></div>
    
    <div class="result" id="resultBox">
        <strong>生成的网址B (点击或复制测试):</strong>
        <a href="#" id="resultLink" target="_blank"></a>
        <div class="note">
            测试方法：复制上方生成的链接，分别使用 Google Chrome 和 Safari/Edge 等其他浏览器打开，观察跳转效果。
        </div>
    </div>

    <div class="history-section">
        <h2>近期生成的链接记录</h2>
        <ul class="history-list" id="historyList">
            <li class="history-item" style="text-align: center; color: #95a5a6;">加载中...</li>
        </ul>
    </div>
</div>

<script>
    // Fetch and display history
    async function loadHistory() {
        try {
            const response = await fetch('/api/history');
            const historyList = document.getElementById('historyList');
            
            if (response.ok) {
                const data = await response.json();
                
                if (data.length === 0) {
                    historyList.innerHTML = '<li class="history-item" style="text-align: center; color: #95a5a6;">暂无记录</li>';
                    return;
                }
                
                historyList.innerHTML = data.map(item => {
                    const date = new Date(item.created_at).toLocaleString('zh-CN', {
                        year: 'numeric', month: '2-digit', day: '2-digit',
                        hour: '2-digit', minute: '2-digit', second: '2-digit'
                    });
                    
                    return `
                        <li class="history-item">
                            <a href="${item.urlB}" target="_blank" class="link-b">${item.urlB}</a>
                            <div class="targets">
                                <strong>谷歌:</strong> <a href="${item.urlC}" target="_blank" style="color: #7f8c8d;">${item.urlC}</a><br>
                                <strong>其他:</strong> <a href="${item.urlA}" target="_blank" style="color: #7f8c8d;">${item.urlA}</a>
                            </div>
                            <div class="time">
                                <span>创建时间: ${date}</span>
                                ${item.ip_location ? `<span class="ip-info" title="${item.ip_address || ''}">📍 ${item.ip_location}</span>` : ''}
                            </div>
                        </li>
                    `;
                }).join('');
            } else {
                historyList.innerHTML = '<li class="history-item" style="text-align: center; color: #e74c3c;">加载记录失败</li>';
            }
        } catch (error) {
            console.error('Failed to load history:', error);
            document.getElementById('historyList').innerHTML = '<li class="history-item" style="text-align: center; color: #e74c3c;">网络错误，无法加载记录</li>';
        }
    }

    // Load history on page load
    window.addEventListener('DOMContentLoaded', loadHistory);

    document.getElementById('generateBtn').addEventListener('click', async () => {
        const urlA = document.getElementById('urlA').value.trim();
        const urlC = document.getElementById('urlC').value.trim();
        const errorMsg = document.getElementById('errorMsg');
        const resultBox = document.getElementById('resultBox');
        const resultLink = document.getElementById('resultLink');

        // Reset states
        errorMsg.style.display = 'none';
        resultBox.style.display = 'none';

        if (!urlA || !urlC) {
            errorMsg.textContent = '请完整填写网址A和网址C';
            errorMsg.style.display = 'block';
            return;
        }

        // Simple validation function to ensure URL has http/https
        const formatUrl = (url) => {
            if (!/^https?:\/\//i.test(url)) {
                return 'http://' + url;
            }
            return url;
        };

        const formattedUrlA = formatUrl(urlA);
        const formattedUrlC = formatUrl(urlC);

        try {
            new URL(formattedUrlA);
            new URL(formattedUrlC);
        } catch (e) {
            errorMsg.textContent = '请输入有效的URL（例如: www.example.com 或 https://example.com）';
            errorMsg.style.display = 'block';
            return;
        }

        const btn = document.getElementById('generateBtn');
        btn.disabled = true;
        btn.textContent = '生成中...';

        try {
            const response = await fetch('/api/generate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ urlA: formattedUrlA, urlC: formattedUrlC })
            });

            const data = await response.json();

            if (response.ok) {
                resultLink.href = data.urlB;
                resultLink.textContent = data.urlB;
                resultBox.style.display = 'block';
                
                // Refresh the history list
                loadHistory();
            } else {
                errorMsg.textContent = data.error || '生成失败，请重试';
                errorMsg.style.display = 'block';
            }
        } catch (error) {
            errorMsg.textContent = '网络错误，请检查服务器是否正常运行';
            errorMsg.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.textContent = '生成专属网址B';
        }
    });
</script>

</body>
</html>
